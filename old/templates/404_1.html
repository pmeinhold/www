<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>404 - Page Not Found | {{ config.title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <a href="/">← Back home</a>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
            <span class="theme-toggle-icon">🌙</span>
        </button>
    </header>

    <main style="text-align: center; padding: 4rem 0;">
        <h1 style="font-size: 4rem; margin: 0;">404</h1>
        <p style="font-size: 1.5rem; margin: 1rem 0;">Page not found</p>
        <p style="color: var(--subtext);">The page you're looking for doesn't exist.</p>
        <a href="/" style="display: inline-block; margin-top: 2rem; padding: 0.75rem 1.5rem; background: var(--surface); border-radius: 6px; text-decoration: none;">Go home</a>
    </main>

    <script src="/theme.js"></script>
</body>
</html>
